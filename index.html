<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
        }

        .container {
            padding-top: 100px;
        }

        h1 {
            font-size: 48px;
        }

        p {
            font-size: 20px;
            color: #aaa;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            background-color: #4CAF50;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>웹사이트 제작 시작</h1>
        <p>이건 내가 직접 만든 첫 디자인 페이지다.</p>
        <button onclick="alert('버튼 클릭됨!')">클릭해보기</button>
    </div>
</body>
</html>
